# Storage: per-inbox SQLite files are created under `./storage` by default.
# Sent contacts DB:  storage/sent_contacts__<host>__<username>__<inbox>.db
# Recent messages DB: storage/recent_messages__<host>__<username>__<inbox>.db
# When running in Docker, mount `./storage:/app/storage` and `./checkpoints:/app/checkpoints`
# to persist memory and checkpoints across restarts.
logging:
  level: debug                    # logging level (panic, fatal, error, warn, info, debug, trace)

defaults:
  system_prompt: |
    You are a cybersecurity analyst specializing in email fraud.
    Your goal is to detect spam, phishing, and spoofed senders.
  user_prompt: |
    Analyze the following email for its spam score.
    Don't sort out legit invoices, transactional or personal email, but sort out SPAM and pure advertising emails.

    Return your analysis as a JSON object with the following fields:
    {
      "score": <int 0-100>,
      "reason": "<short explanation of why this score was given>",
      "is_phishing": <bool>
    }
    Only return the JSON. No other text.

    Recent context:
    {{.Context}}

    Headers:
    {{.Headers}}

    From: {{.From}}
    To: {{.To}}
    Delivered-To: {{.DeliveredTo}}
    Cc: {{.Cc}}
    Bcc: {{.Bcc}}
    Subject: {{.Subject}}

    Email body:
    {{.Body}}
  consolidation_system_prompt: |
    You are an email summary assistant. Your goal is to safely consolidate recent inbox activity for later spam analysis.
    Produce a short summary in five sentences.
  consolidation_user_prompt: |
    Create a new concise consolidation from the previous summary and the recent message metadata.
    Do not output a detailed list of messages, recipients, senders, or headers.

    Previous consolidation: {{.PreviousConsolidation}}

    Latest senders: {{.LatestSenders}}

    Recent messages:
    {{range .Messages}}
    - From: {{.From}}, To: {{.To}}, Subject: {{.Subject}}, Score: {{.SpamScore}}, Reason: {{.LLMReason}}
    {{end}}
  consolidation_prompt: |
    Use the previous consolidation and recent messages to create a new concise summary in five sentences.
    Do not output a detailed list of messages, recipients, senders, or headers.
    Use the message metadata and the previous consolidation only as background context.

    Previous consolidation: {{.PreviousConsolidation}}

    Latest senders: {{.LatestSenders}}

    Recent messages:
    {{range .Messages}}
    - From: {{.From}}, To: {{.To}}, Subject: {{.Subject}}, Score: {{.SpamScore}}, Reason: {{.LLMReason}}
    {{end}}

providers:                        # providers to be used for inboxes
  prov1:                          # provider name
    type: openai                  # provider type
    concurrency: 1                # optional: worker concurrency for this provider
    rate_limit: 0                 # optional: rate limit (calls per second)
    config:                       # provider specific configuration
      apikey: some-api-key        # apikey
      model: gpt-4o-mini          # gpt model to use
      maxsize: 100000             # message size limit for prompt (bytes)
      temperature: 0.1            # optional: sampling temperature (0.0-2.0)
      max_tokens: 8               # optional: max tokens in the response
      # Optional overrides for spam analysis prompt A:
      # system_prompt: |
      #   You are a cybersecurity analyst specializing in email fraud.
      #   Your goal is to detect spam, phishing, and spoofed senders.
      # user_prompt: |
      #   Analyze the following email for its spam score.
      #   Return a spam score between 0 and 100. Only output the integer.
      #   ...
      # Optional consolidation overrides for prompt B:
      # consolidation_model: gpt-3.5-turbo
      # consolidation_system_prompt: |
      #   You are an email summary assistant.
      #   Produce a short summary of recent messages.
      # consolidation_user_prompt: |
      #   Create a new concise consolidation from the previous summary and recent message metadata.
  prov2:                          # provider name
    type: ollama                  # provider type
    concurrency: 1                # optional: worker concurrency for this provider
    rate_limit: 0                 # optional: rate limit (calls per second)
    config:                       # provider specific configuration
      url: http://127.0.0.1:11434 # url
      model: gpt-oss:20b          # model to use for classification
      maxsize: 100000             # message size limit for prompt (bytes)
      # temperature: 0.2          # optional: sampling temperature
      # top_p: 0.95               # optional: nucleus sampling probability
      # max_tokens: 512           # optional: max tokens in the response (maps to num_predict)
      # consolidation_model: gpt-oss:7b       # optional: use a different model for consolidation
      # consolidation_prompt: |              # optional: custom consolidation prompt
      #   ...
  prov3:                          # provider name
    type: spamassassin            # provider type
    config:                       # provider specific configuration
      host: 127.0.0.1             # spamassassin host
      port: 783                   # spamassassin port
      maxsize: 300000             # message size limit
      timeout: 10s                # connection timeout
  prov4:                          # provider name
    type: gemini                  # provider type
    concurrency: 1                # optional: worker concurrency for this provider
    rate_limit: 0                 # optional: rate limit (calls per second)
    config:                       # provider specific configuration
      apikey: some-api-key        # apikey
      model: gemini-2.5-flash     # model to use
      maxsize: 100000             # message size limit for prompt (bytes)
      # temperature: 0.2          # optional: sampling temperature
      # top_p: 0.95               # optional: nucleus sampling probability
      # max_tokens: 512           # optional: max output tokens

whitelists:                       # trusted senders as regexp, not to be analyzed
  whitelist1:                     # example with exact addresses
    - ^.* <info@example.com>$     # matches <info@example.com>
    - ^.* <contact@domain.com>$   # matches <contact@domain.com>
  whitelist2:                     # example with only domain match
    - ^.* <.*@example.com>$       # matches for all @example.com addresses
    - ^.* <.*@domain.com>$        # matches for all @domain.com addresses

inboxes:                          # inboxes to be checked
  - schedule: "* * * * *"         # schedule in cron format (when to execute spam analysis)
    host: mail.domain.tld         # imap host
    port: 143                     # imap port
    tls: false                    # imap tls
    username: user@domain.tld     # imap user
    password: mypass              # imap password
    provider: prov1               # provider used for spam analysis
    consolidation_provider: prov2 # optional provider used only for consolidation
    inbox: INBOX                  # inbox folder
    spam: INBOX.Spam              # spam folder
    minscore: 75                  # min score to detect spam (0-100)
    minage: 0h                    # min age of message
    maxage: 24h                   # max age of message
    whitelist: whitelist1         # whitelist to use, empty/missing = no whitelist
    # enable_sent_whitelist: true  # enable sent-folder memory to auto-whitelist replies
    # sent_folder: Sent            # folder to scan for outgoing messages
    # sent_folder_maxage: 2160h    # how long sent contacts are retained (default 3 months)
    # sent_folder_schedule: "0 * * * *" # cron schedule for sent-folder sync
    recent_consolidation_every: 50 # run consolidation after this many processed messages
    recent_consolidation_interval: 14d # refresh consolidation if older than this interval
    max_retries: 3                 # optional: max retry attempts for provider analysis (0 disables retries)
    # enable_idle: false          # set to true to use IMAP IDLE instead of the cron schedule above
    # idle_timeout: 25m           # re-issue IDLE after this duration (RFC 2177 compliance, default 25m)
